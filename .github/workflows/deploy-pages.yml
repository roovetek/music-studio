# Build the site with correct Vite base (/)<repo>/ (from GITHUB_REPOSITORY) and push dist/ to `deploy`.
# Point GitHub Pages at branch `deploy`, folder `/ (root)`.
name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Production build + 404.html
        run: npm run build:pages

      - name: Publish dist to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true
